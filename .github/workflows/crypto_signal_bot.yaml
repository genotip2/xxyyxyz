name: Crypto Signal Bot

on:
  schedule:
    # Jalankan setiap 1 jam (Menit ke-15 setiap jam)
    # Format cron GitHub Actions menggunakan UTC.
    # 15 * * * * = 07:15, 08:15, 09:15 WIB, dst.
    - cron: "15 * * * *"
  workflow_dispatch: # Agar bisa dijalankan manual kapan saja

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Mencegah workflow hang selamanya
    permissions:
      contents: write # PENTING: Memberi izin agar bot bisa push file json ke repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Penting agar git push berfungsi dengan baik

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests tradingview-ta

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crypto_signal_bot.py # Pastikan nama file python Anda persis ini

      - name: Check for changes and commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # PERBAIKAN: Menggunakan *.json agar mencakup active_buys, pairs_cache, DAN cooldowns
          git add *.json 
          
          if git diff --cached --exit-code; then
            echo "No changes to commit"
          else
            git commit -m "chore: update bot state [skip ci]"
            git push
          fi
